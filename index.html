<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café - Comandas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="login-screen" class="login-overlay">
    <div class="login-card">
      <h1>Ingreso al comandero</h1>
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="usuario@cafe.com">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="********">
        <button class="btn btn-primary" type="submit">Ingresar</button>
        <p id="login-error" class="error-message"></p>
      </form>
      <p class="login-note">Usá un usuario registrado en Firebase Authentication y un rol asignado en Firestore.</p>
    </div>
  </div>

  <div id="app-screen" class="hidden">
    <header>
      <div>
        <h1>☕ Sistema de Comandas</h1>
        <p>App en tiempo real para pedidos y gestión de comandas.</p>
      </div>
      <div class="user-bar">
        <span id="user-role"></span>
        <button id="btn-logout" class="btn btn-secondary">Salir</button>
      </div>
    </header>

    <main>
      <section class="panel productos-panel">
        <h2>Productos</h2>
        <div id="productos"></div>
      </section>

      <section class="panel carrito-panel">
        <h2>🧾 Pedido</h2>
        <textarea id="detalle" placeholder="Ej: sin azúcar, leche vegetal..." rows="3"></textarea>
        <ul id="carrito" class="carrito-list"></ul>
        <div class="resumen">
          <span>Total:</span>
          <strong>$<span id="total">0</span></strong>
        </div>
        <button id="btn-finalizar" class="btn btn-primary">Finalizar Pedido</button>
        <button id="btn-limpiar" class="btn btn-secondary">Limpiar Carrito</button>
      </section>
    </main>

    <section class="panel ordenes-panel hidden" id="ordenes-panel">
      <h2>Comandas en tiempo real</h2>
      <div id="comandas" class="ordenes-list"></div>
    </section>

    <footer>
      <a href="admin.html">Ir a panel administrativo</a>
    </footer>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth.js"></script>
  <script src="data/productos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
