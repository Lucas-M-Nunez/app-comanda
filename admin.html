<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ventas del día</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="login-screen" class="login-overlay">
    <div class="login-card">
      <h1>Ingreso administrativo</h1>
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="admin@cafe.com">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="********">
        <button class="btn btn-primary" type="submit">Ingresar</button>
        <p id="login-error" class="error-message"></p>
      </form>
      <p class="login-note">Acceso para dueño, barista, cajero y mozo con roles configurados en Firebase.</p>
    </div>
  </div>

  <div id="app-screen" class="hidden">
    <header>
      <div>
        <h1>📊 Gestión del café</h1>
        <p>Panel administrativo con ventas, filtros y menú en tiempo real.</p>
      </div>
      <div class="user-bar">
        <span id="user-role"></span>
        <button id="btn-logout" class="btn btn-secondary">Salir</button>
      </div>
    </header>

    <main class="admin-grid">
      <section class="panel ventas-panel">
        <h2>Ventas del día</h2>
        <label for="fecha-filtro">Filtrar por fecha</label>
        <input type="date" id="fecha-filtro">
        <ul id="ventas" class="carrito-list"></ul>
        <div class="resumen">
          <span>Total del día:</span>
          <strong>$<span id="totalDia">0</span></strong>
        </div>
        <button id="btn-limpiar-ventas" class="btn btn-secondary">Limpiar filtro</button>
        <p id="admin-warning" class="info-text"></p>
      </section>

      <section class="panel productos-admin-panel">
        <h2>Gestión de productos</h2>
        <form id="producto-form" class="producto-form">
          <input type="hidden" id="producto-id">
          <label for="producto-nombre">Nombre</label>
          <input type="text" id="producto-nombre" required>
          <label for="producto-precio">Precio</label>
          <input type="number" id="producto-precio" required min="0">
          <label for="producto-categoria">Categoría</label>
          <input type="text" id="producto-categoria" required placeholder="Cafés, Panadería, Promos">
          <button class="btn btn-primary" id="producto-accion">Agregar producto</button>
        </form>
        <ul id="productos-admin" class="carrito-list"></ul>
      </section>
    </main>

    <footer>
      <a href="index.html">Volver a la comanda</a>
    </footer>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/auth.js"></script>
  <script src="data/productos.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
