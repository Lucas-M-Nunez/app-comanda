<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ventas del día</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>📊 Ventas del día</h1>
    <p>Resumen de ingresos registrados desde la app.</p>
  </header>

  <main class="panel">
    <ul id="ventas" class="carrito-list"></ul>
    <div class="resumen">
      <span>Total del día:</span>
      <strong>$<span id="totalDia">0</span></strong>
    </div>
    <button id="btn-limpiar-ventas" class="btn btn-secondary">Limpiar historial</button>
  </main>

  <footer>
    <a href="index.html">Volver a la comanda</a>
  </footer>

  <script>
    const ventas = JSON.parse(localStorage.getItem("ventas")) || [];
    const lista = document.getElementById("ventas");
    const totalDiaHTML = document.getElementById("totalDia");
    const btnLimpiarVentas = document.getElementById("btn-limpiar-ventas");

    let totalDia = 0;

    if (ventas.length === 0) {
      const li = document.createElement("li");
      li.textContent = "No hay ventas registradas todavía.";
      li.style.color = "#555";
      lista.appendChild(li);
    }

    ventas.forEach(v => {
      const li = document.createElement("li");
      li.innerHTML = `<span>${v.fecha}</span><strong>$${v.total}</strong>`;
      lista.appendChild(li);
      totalDia += v.total;
    });

    totalDiaHTML.textContent = totalDia;

    btnLimpiarVentas.addEventListener("click", () => {
      if (confirm("¿Querés borrar todas las ventas del día?")) {
        localStorage.removeItem("ventas");
        location.reload();
      }
    });
  </script>
</body>
</html>
